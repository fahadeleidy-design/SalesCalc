<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - SalesCalc</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    h1 {
      font-size: 32px;
      color: #1a202c;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #fed7d7;
      color: #c53030;
      border-radius: 50px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #c53030;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .features {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #e2e8f0;
    }

    .features h2 {
      font-size: 18px;
      color: #2d3748;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .feature-list {
      text-align: left;
      display: inline-block;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      color: #4a5568;
      font-size: 14px;
    }

    .feature-icon {
      width: 24px;
      height: 24px;
      background: #c6f6d5;
      color: #22543d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📡
    </div>
    
    <h1>You're Offline</h1>
    
    <div class="status">
      <span class="status-dot"></span>
      No Internet Connection
    </div>
    
    <p>
      It looks like you've lost your internet connection. 
      Please check your network settings and try again.
    </p>
    
    <button class="btn" onclick="location.reload()">
      Try Again
    </button>
    
    <div class="features">
      <h2>What you can do offline:</h2>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>View cached quotations</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>Create new quotations (will sync when online)</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>Browse product catalog</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>View customer information</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Auto-retry when online
    window.addEventListener('online', () => {
      location.reload();
    });

    // Check connection status
    setInterval(() => {
      if (navigator.onLine) {
        location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
